<!DOCTYPE html>
<html>

<head>
<title>RideCare Chat</title>

<style>

body{
    font-family: Arial;
    background:#111;
    color:white;
}

.chatbox{
    width:400px;
    margin:50px auto;
    background:#222;
    border-radius:10px;
    padding:20px;
}

.messages{
    height:350px;
    overflow-y:auto;
    border-bottom:1px solid #444;
    margin-bottom:10px;
}

.message{
    margin:10px 0;
}

.user{
    text-align:right;
    color:#4fc3f7;
}

.bot{
    text-align:left;
    color:#81c784;
}

input{
    width:75%;
    padding:10px;
}

button{
    padding:10px;
}

</style>

</head>

<body>

<div class="chatbox">

<h2>🏍 RideCare Assistant</h2>

<div id="messages" class="messages"></div>

<input id="input" placeholder="Describe your bike issue..." />
<button onclick="sendMessage()">Send</button>

</div>

<script>

const API = "http://127.0.0.1:8000/chat"

const session_id = "webuser1"
const phone = "9999999999"

function addMessage(text, sender){

    const div = document.createElement("div")
    div.className = "message " + sender
    div.innerText = text

    document.getElementById("messages").appendChild(div)

}

async function sendMessage(){

    const input = document.getElementById("input")
    const text = input.value

    if(!text) return

    addMessage(text,"user")

    input.value=""

    const response = await fetch(API,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            text:text,
            session_id:session_id,
            phone:phone
        })
    })

    const data = await response.json()

    addMessage(data.reply,"bot")

}

</script>

</body>
</html>
